{% extends 'base.html' %}

{% block content %}
<article class="bg-white p-5 rounded shadow-sm">
    <nav aria-label="breadcrumb">
      <ul class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'home' %}">Início</a></li>
        <li class="breadcrumb-item active">{{ noticia.categoria.nome }}</li>
      </ul>
    </nav>

    <h1 class="display-4">{{ noticia.titulo }}</h1>
    <p class="text-muted">Publicado em {{ noticia.data_publicacao|date:"d/m/Y H:i" }}</p>
    
    <hr>

    {% if noticia.imagem %}
    <img src="{{ noticia.imagem.url }}" class="img-fluid rounded mb-4" alt="{{ noticia.titulo }}" style="width: 100%; max-height: 500px; object-fit: cover;">
    {% endif %}

    <div class="lead mb-4" style="font-weight: 500;">
        {{ noticia.resumo }}
    </div>

    <div class="content" style="line-height: 1.8; font-size: 1.1rem;">
        {{ noticia.conteudo|linebreaks }}
    </div>

    <div class="mt-5">
        <a href="{% url 'home' %}" class="btn btn-secondary">Voltar para a Home</a>
    </div>
</article>
{% endblock %}
